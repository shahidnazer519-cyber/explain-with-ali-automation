name: Daily Korean Reel Auto-Upload

on:
  schedule:
    # ہر روز دوپہر 3:00 بجے PKT (10:00 AM UTC) پر خودکار چلے گا
    - cron: '0 10 * * *'
  workflow_dispatch: # GitHub UI میں مینول 'Run workflow' بٹن کے لیے

jobs:
  process_and_upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # ہسٹری فائل اپڈیٹ اور پش کرنے کے لیے ضروری ہے

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # moviepy اور لائبیرریز کو کیشے کر کے انسٹالیشن فاسٹ کرے گا

      - name: Ensure FFmpeg is Installed
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Automation & AI Script
        env:
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          BUFFER_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }} # دونوں نام سپورٹ کرے گا
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Commit and Push History Status
        run: |
          git config --global user.name "ExplainWithAli Bot"
          git config --global user.email "bot@explainwithali.com"
          git add history.txt videos/
          git commit -m "📦 Processed reel and updated history [skip ci]" || echo "No changes to commit"
          git pull origin main --rebase # 🛡️ یہ لائن سرور کو سنک کرے گی تاکہ rejected ایرر نہ آئے
          git push # اب پش 100% کامیاب ہوگا
