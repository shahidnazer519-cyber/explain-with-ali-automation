name: Process and Upload Video

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # یہاں آپ کا GDRIVE_JSON خفیہ طور پر شامل کیا گیا ہے
    env:
      GDRIVE_JSON: ${{ secrets.GDRIVE_JSON }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install moviepy google-genai google-api-python-client google-auth requests

      - name: Run Automation Script
        run: |
          python main.py

      - name: Commit and Push History
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add history.txt
          git commit -m "Update video history" || echo "No changes to commit"
          git push
