name: Daily Korean Reel Auto-Upload

on:
  schedule:
    # Har roz Dopahar 3:00 PM PKT (10:00 AM UTC)
    - cron: '0 10 * * *'
  workflow_dispatch: # Manual test button in GitHub UI

jobs:
  process_and_upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Ensure FFmpeg is Installed
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Run Automation & AI Script
        env:
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Commit and Push History & Archive Status
        run: |
          git config --global user.name "ExplainWithAli Bot"
          git config --global user.email "bot@explainwithali.com"
          git add videos/ archive/ history.json
          git commit -m "📦 Uploaded reel, updated history & archived [skip ci]" || echo "No changes to commit"
          git push
